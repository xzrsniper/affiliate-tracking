# Nginx: коли `root` вказує на frontend/dist і використовується try_files (без proxy для статики)
# Додайте ці location ПЕРЕД загальним `location / { try_files ... }`, щоб PSI бачив
# явний Cache-Control для /assets/* та /logo.svg.

location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location = /logo.svg {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
}

location = /apple-touch-icon.png {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
}
