# Додай цей блок всередину server { } для lehko.space, в location який робить proxy_pass на Node.
# Це змусить браузер не кешувати головну сторінку і завжди брати свіжий index.html.

location / {
    proxy_pass http://127.0.0.1:3000;   # твій порт Node
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Не кешувати відповіді — браузер завжди візьме новий index.html і нові JS/CSS
    proxy_no_cache 1;
    proxy_cache_bypass 1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";
}
