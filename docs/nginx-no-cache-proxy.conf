# Nginx: reverse proxy до Node (Express) для lehko.space
#
# ВАЖЛИВО: не додавайте Cache-Control: no-store для всього location / — тоді
# PSI/Lighthouse показує «Cache TTL: None» для /assets/*.js, *.css і /logo.svg,
# навіть якщо Express уже віддає public, max-age=31536000.
#
# Використання: скопіюйте потрібні location-блоки в server { } (замініть порт за потреби).

# --- Довгий кеш для зібраних файлів Vite (хеш у імені файлу) ---
location ^~ /assets/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Не підміняти Cache-Control від Node — там immutable + 1y
}

# --- Статика в корені dist без хешу (логотип, іконки) ---
location = /logo.svg {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /apple-touch-icon.png {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- HTML і SPA fallback: завжди свіжий index.html (нові хеші assets) ---
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_no_cache 1;
    proxy_cache_bypass 1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}
