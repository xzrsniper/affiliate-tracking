# ============================================================
# DDoS / Rate-limit protection for lehko.space
# ============================================================

# --- Rate limit zones (defined at http level) ---
# General: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=general:20m rate=30r/s;
# API: 10 req/s per IP
limit_req_zone $binary_remote_addr zone=api:10m    rate=10r/s;
# Auth endpoints: 5 req/min per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth:5m    rate=5r/m;
# Connection count: max 50 simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn:10m;

# --- Log format for fail2ban ---
log_format ddos '$remote_addr [$time_local] "$request" $status $body_bytes_sent';

# --- Timeouts (Slowloris protection) ---
client_body_timeout    10s;
client_header_timeout  10s;
keepalive_timeout      30s;
send_timeout           10s;
reset_timedout_connection on;

# --- Size limits ---
client_max_body_size   10m;
client_body_buffer_size 128k;

# --- Hide nginx version ---
server_tokens off;
