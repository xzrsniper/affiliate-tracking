# === lehko.space — HTTP redirect + HTTPS ===
# Один listen на 443 для IP VPS (без дубля з listen 443 + listen IP:443 — інакше restart nginx падає на bind).

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    listen 185.237.207.109:80;
    server_name lehko.space www.lehko.space;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 185.237.207.109:443 ssl http2;

    server_name lehko.space www.lehko.space;

    ssl_certificate /etc/letsencrypt/live/lehko.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lehko.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/affiliate-tracking/frontend/dist;
    index index.html;

    # index.html — no cache (always fresh build)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Hashed Vite assets — long cache (PageSpeed)
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    location = /logo.svg {
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /apple-touch-icon.png {
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Console code page
    location = /console-code {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # pixel.js via backend
    location = /pixel.js {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # tracker.js via backend
    location = /tracker.js {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Track endpoint
    location /track {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API backend
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Uploads
    location /uploads {
        proxy_pass http://127.0.0.1:3000;
    }

    # Frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    access_log /var/log/nginx/lehko.space.access.log;
    error_log /var/log/nginx/lehko.space.error.log;
}
