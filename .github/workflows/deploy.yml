name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── 2. Lint / syntax-check backend ──────────────────────────────────────────
  lint-backend:
    name: Check Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js

  # ── 3. Deploy to VPS via SSH ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: [build-frontend, lint-backend]
    runs-on: ubuntu-latest
    # Only deploy on push to main (not on PRs), and only when SSH secrets are set
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/var/www/affiliate-tracking"

            echo "=== Pulling latest code ==="
            git -C "$APP_DIR" fetch origin main
            git -C "$APP_DIR" reset --hard origin/main

            echo "=== Installing backend deps ==="
            cd "$APP_DIR"
            npm ci --omit=dev

            echo "=== Building frontend ==="
            cd "$APP_DIR/frontend"
            npm ci
            npm run build

            echo "=== Running DB migrations ==="
            cd "$APP_DIR"
            node scripts/ensure-conversions-schema.js 2>/dev/null || true

            echo "=== Reloading PM2 ==="
            pm2 reload affiliate-tracking-api --update-env || pm2 start ecosystem.config.cjs --env production
            pm2 save

            echo "=== Deploy complete ==="
            pm2 status
