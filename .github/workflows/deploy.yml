name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend starts without errors
        run: node --check server.js
        env:
          NODE_ENV: production
          PORT: 3000
          JWT_SECRET: ci-test-secret-placeholder
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test

  notify-render:
    name: Trigger Render Deploy
    needs: [build-frontend, lint-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -s "$RENDER_DEPLOY_HOOK_URL" \
              -X POST \
              -d '{}' \
              --fail-with-body
            echo "Render deploy triggered successfully"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — Render auto-deploys from GitHub directly"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
